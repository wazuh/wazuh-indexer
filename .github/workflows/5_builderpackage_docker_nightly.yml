name: (5.x) Build Docker image (nightly)

# This workflow runs when any of the following occur:
# - Schedule: every week-day at midnight.

on:
  push:
  schedule:
    - cron: "0 0 * * 1-5"

jobs:
  call-docker-workflow:
    permissions:
      actions: read
      contents: read
      id-token: write
      packages: read
    uses: ./.github/workflows/5_builderpackage_docker.yml
    secrets: inherit
    with:
      id: "nightly"
      plugins_ref: ${{ github.event.repository.default_branch }}
      revision: "latest"
