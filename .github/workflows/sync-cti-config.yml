name: Sync CTI config to wazuh-indexer-plugins

on:
  push:
    branches:
      - main
    paths:
      - 'build-scripts/cti-config.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-cti-config:
    name: Propagate CTI config changes
    runs-on: ubuntu-latest
    steps:
      - name: Checkout wazuh-indexer
        uses: actions/checkout@v4
        with:
          path: wazuh-indexer

      - name: Checkout wazuh-indexer-plugins
        uses: actions/checkout@v4
        with:
          repository: wazuh/wazuh-indexer-plugins
          token: ${{ secrets.PLUGINS_REPO_TOKEN }}
          path: wazuh-indexer-plugins

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq jq

      - name: Run sync script
        run: |
          bash wazuh-indexer/build-scripts/sync_cti_config.sh \
            --config wazuh-indexer/build-scripts/cti-config.json \
            --plugins-dir wazuh-indexer-plugins

      - name: Check for changes
        id: changes
        working-directory: wazuh-indexer-plugins
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PLUGINS_REPO_TOKEN }}
          path: wazuh-indexer-plugins
          branch: automated/sync-cti-config
          delete-branch: true
          title: "chore: sync CTI configuration from wazuh-indexer"
          body: |
            This PR was automatically generated by the **Sync CTI config** workflow
            in `wazuh-indexer` after a change to `build-scripts/cti-config.json`.

            ### Updated files
            - `PluginSettings.java` — default CTI URL, context and consumer values
            - `TelemetryClient.java` — telemetry ping URI
            - `configuration.md` — documentation defaults

            > **Source of truth:** [`build-scripts/cti-config.json`](https://github.com/wazuh/wazuh-indexer/blob/main/build-scripts/cti-config.json)

            Please review and merge.
          commit-message: "chore: sync CTI configuration from wazuh-indexer"
          labels: |
            automated
            configuration